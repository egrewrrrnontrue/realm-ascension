<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Realm Ascension - A deep, zone-based incremental game with discovery mechanics and strategic resource management.">
    <title>Realm Ascension</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="gameContainer" class="game-container">
        <!-- Header -->
        <header class="header">
            <h1>⚔️ Realm Ascension</h1>
            <p class="tagline">Explore. Build. Ascend.</p>
        </header>

        <!-- Main Game Area -->
        <div class="main-content">
            <!-- Left Panel: Zone Info -->
            <aside class="left-panel">
                <div class="zone-card">
                    <h2 id="zoneName">Grasslands</h2>
                    <p id="zoneDescription">The starting realm. Gather resources and build your first structures.</p>
                    <div class="zone-stats">
                        <div class="stat-item">
                            <span class="stat-label">Zone Level:</span>
                            <span class="stat-value" id="zoneLevel">1</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Unlocked:</span>
                            <span class="stat-value" id="unlocked">Yes</span>
                        </div>
                    </div>
                    <div id="zoneProgress" class="zone-progress" style="display:none;">
                        <p class="progress-label">Progress to next zone:</p>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <p class="progress-text" id="progressText">0 / 100</p>
                    </div>
                </div>

                <!-- Zone Navigation -->
                <div class="zone-nav">
                    <h3>🗺️ Available Zones</h3>
                    <div class="zone-list" id="zoneList"></div>
                </div>
            </aside>

            <!-- Center Panel: Main Game Area -->
            <main class="center-panel">
                <!-- Resources Display -->
                <div class="resources-section">
                    <h2>📊 Resources</h2>
                    <div class="resources-grid" id="resourcesGrid"></div>
                </div>

                <!-- Main Action Area -->
                <div class="action-section">
                    <div class="primary-action" id="primaryAction"></div>
                </div>

                <!-- Buildings -->
                <div class="buildings-section">
                    <h2>🏗️ Structures</h2>
                    <div class="buildings-grid" id="buildingsGrid"></div>
                </div>
            </main>

            <!-- Right Panel: Stats & Upgrades -->
            <aside class="right-panel">
                <!-- Stats -->
                <div class="stats-card">
                    <h3>📈 Stats</h3>
                    <div class="stats-list" id="statsList"></div>
                </div>

                <!-- Upgrades -->
                <div class="upgrades-card">
                    <h3>⚡ Upgrades</h3>
                    <div class="upgrades-list" id="upgradesList"></div>
                </div>

                <!-- Actions -->
                <div class="actions-card">
                    <button class="btn btn-secondary" id="saveBtn">💾 Save</button>
                    <button class="btn btn-secondary" id="resetBtn">🔄 Reset</button>
                </div>
            </aside>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
