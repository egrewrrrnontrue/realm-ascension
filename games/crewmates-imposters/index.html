<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crewmates vs Imposters</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🚀 Crewmates vs Imposters</h1>
        
        <!-- Game Setup Screen -->
        <div id="setupScreen" class="screen active">
            <h2>Setup Game</h2>
            <div class="setup-form">
                <div class="form-group">
                    <label for="playerCount">Number of Players:</label>
                    <input type="number" id="playerCount" min="4" max="15" value="8">
                </div>
                <div class="form-group">
                    <label for="imposterCount">Number of Imposters:</label>
                    <input type="number" id="imposterCount" min="1" max="3" value="2">
                </div>
                <button onclick="startGame()" class="btn btn-primary">Start Game</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="gameScreen" class="screen">
            <div class="game-header">
                <div class="status">Status: <span id="gameStatus">Playing</span></div>
                <div class="round">Round: <span id="roundCounter">1</span></div>
                <button onclick="callMeeting()" class="btn btn-meeting">📢 Call Meeting</button>
            </div>

            <div class="game-grid">
                <div class="section">
                    <h3>Crewmates</h3>
                    <div id="crewmatesList" class="players-list"></div>
                </div>
                <div class="section">
                    <h3>Imposters (Hidden)</h3>
                    <div id="impostersList" class="players-list"></div>
                </div>
            </div>

            <div class="tasks-section">
                <h3>Tasks</h3>
                <div id="tasksList" class="tasks-list"></div>
            </div>

            <div class="actions">
                <button onclick="endRound()" class="btn btn-secondary">End Round</button>
                <button onclick="resetGame()" class="btn btn-danger">New Game</button>
            </div>
        </div>

        <!-- Meeting Screen -->
        <div id="meetingScreen" class="screen">
            <h2>Emergency Meeting</h2>
            <div class="discussion">
                <p>Everyone gather! Someone call a meeting.</p>
            </div>
            <div class="voting-section">
                <h3>Vote Someone Out</h3>
                <div id="votingList" class="voting-list"></div>
                <p class="skip-vote" onclick="skipVote()">Skip Vote</p>
            </div>
            <div id="voteResults" class="vote-results"></div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="screen">
            <h2 id="gameOverTitle">Game Over!</h2>
            <div id="gameOverContent" class="game-over-content"></div>
            <button onclick="resetGame()" class="btn btn-primary">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
